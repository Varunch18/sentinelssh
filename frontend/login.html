<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentinelSSH — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="loginForm">
      <div class="brand">
        <span class="logo">🛡</span>
        <span>SentinelSSH<small>SOC Threat Intelligence</small></span>
      </div>
      <div class="login-sub">Security Operations Center</div>

      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" autofocus required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button class="login-btn" type="submit">Sign in</button>
      <div class="login-error" id="loginError"></div>
      <div class="login-hint">Authorized access only. Activity is monitored.</div>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errBox = document.getElementById('loginError');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.style.display = 'none';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = '/';
        } else {
          errBox.textContent = (data.error && data.error.message) || 'Login failed';
          errBox.style.display = 'block';
        }
      } catch (err) {
        errBox.textContent = 'Network error. Please try again.';
        errBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
