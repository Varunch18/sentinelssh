# SentinelSSH — Nginx reverse proxy for the SOC dashboard/API.
# Proxies HTTPS :443 -> backend container :8008 (HTTP + SocketIO/WebSocket).
# Place at /etc/nginx/sites-available/sentinelssh and symlink into sites-enabled.
# Certbot (--nginx) will inject the listen 443 ssl + certificate lines.

upstream sentinelssh_backend {
    server 127.0.0.1:8008;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name soc.example.com;          # <-- change to your domain

    # Allow ACME HTTP-01 challenges; redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name soc.example.com;          # <-- change to your domain

    # --- TLS (certbot manages these paths) ---
    ssl_certificate     /etc/letsencrypt/live/soc.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soc.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 4m;

    # --- WebSocket / SocketIO ---
    location /socket.io/ {
        proxy_pass http://sentinelssh_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    # --- HTTP API + static dashboard ---
    location / {
        proxy_pass http://sentinelssh_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block direct access to the internal honeypot->backend event API.
    location /api/internal/ {
        deny all;
        return 403;
    }
}
