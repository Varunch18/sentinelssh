# Alembic configuration for SentinelSSH.
# The sqlalchemy.url is intentionally left blank here; it is injected at runtime
# from the DATABASE_URL environment variable in migrations/env.py.
# NOTE: run from the repository root, e.g.:
#   alembic -c core/alembic.ini revision --autogenerate -m "msg"
#   alembic -c core/alembic.ini upgrade head
[alembic]
script_location = core/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
